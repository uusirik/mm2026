name: Fetch Odds

on:
  schedule:
    - cron: '0 7,19 * * *'   # kahdesti päivässä: klo 7 ja 19 UTC
  workflow_dispatch:           # voi ajaa käsin

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Hae kertoimet (The Odds API)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/fetch-odds.js
